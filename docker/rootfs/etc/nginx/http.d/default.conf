server {
        listen 80 default_server;
        listen [::]:80 default_server;

        # Proxy api and websockets to port 3333
        location /ws/ {
                proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
                proxy_set_header X-Real-IP       $remote_addr;
                proxy_http_version               1.1;
                proxy_set_header                 Upgrade $http_upgrade;
                proxy_set_header                 Connection "upgrade";
                proxy_pass                       http://127.0.0.1:3333;
        }

        location /api/ {
                proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
                proxy_set_header X-Real-IP       $remote_addr;
                proxy_pass                       http://127.0.0.1:3333;
        }

        location /cgi-bin/ {
                proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
                proxy_set_header X-Real-IP       $remote_addr;
                proxy_buffering                  off;
                proxy_cache                      off;
                proxy_pass                       http://127.0.0.1:3333;
        }

        location /a/ {
                proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
                proxy_set_header X-Real-IP       $remote_addr;
                proxy_buffering                  off;
                proxy_cache                      off;
                proxy_pass                       http://127.0.0.1:3333;
        }

        location /debug/ {
                proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
                proxy_set_header X-Real-IP       $remote_addr;
                proxy_pass                       http://127.0.0.1:3333;
        }

        # Raven mesh chat - auth via Go backend
        location = /raven/auth {
                internal;
                proxy_pass                       http://127.0.0.1:3333/api/v1/auth/check;
                proxy_pass_request_body          off;
                proxy_set_header Content-Length   "";
                proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
                proxy_set_header X-Real-IP       $remote_addr;
        }

        # Raven WebSocket proxy
        location = /raven/ws {
                auth_request                     /raven/auth;
                proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
                proxy_set_header X-Real-IP       $remote_addr;
                proxy_http_version               1.1;
                proxy_set_header                 Upgrade $http_upgrade;
                proxy_set_header                 Connection "upgrade";
                proxy_pass                       http://127.0.0.1:4404/;
                proxy_intercept_errors           on;
                error_page 502 =503              /raven_unavailable;
        }

        # Raven UI static files
        location = /raven {
                return 302 $scheme://$host/raven/;
        }

        location /raven/ {
                auth_request                     /raven/auth;
                alias                            /usr/local/raven/ui/;
                index                            index.html;
        }

        location = /raven_unavailable {
                internal;
                return 503;
        }

        location / {
                root /www/;
                try_files $uri $uri/ /index.html =404;
        }

        location = /meshmap {
                return 302 $scheme://$host/meshmap/;
        }

        location /meshmap/ {
                alias /meshmap/;
                try_files $uri $uri/ /index.html =404;
        }
}

